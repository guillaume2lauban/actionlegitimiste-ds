backend:
  name: git-gateway
  branch: main

media_folder: "img/uploads"
public_folder: "/img/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "accueil"
        label: "Accueil"
        file: "content/accueil.json"
        fields:
          - { label: "Titre principal", name: "hero_title", widget: "string" }
          - { label: "Sous-titre", name: "hero_subtitle", widget: "string" }
          - { label: "Titre bannière CTA", name: "cta_title", widget: "string" }
          - { label: "Texte bannière CTA", name: "cta_text", widget: "text" }
          - {
              label: "Highlight 1 titre",
              name: "highlight1_title",
              widget: "string",
            }
          - {
              label: "Highlight 1 texte",
              name: "highlight1_text",
              widget: "text",
            }
          - {
              label: "Highlight 2 titre",
              name: "highlight2_title",
              widget: "string",
            }
          - {
              label: "Highlight 2 texte",
              name: "highlight2_text",
              widget: "text",
            }
          - {
              label: "Highlight 3 titre",
              name: "highlight3_title",
              widget: "string",
            }
          - {
              label: "Highlight 3 texte",
              name: "highlight3_text",
              widget: "text",
            }
          - {
              label: "Compteur 1 label",
              name: "counter1_label",
              widget: "string",
            }
          - {
              label: "Compteur 1 valeur",
              name: "counter1_value",
              widget: "number",
            }
          - {
              label: "Compteur 2 label",
              name: "counter2_label",
              widget: "string",
            }
          - {
              label: "Compteur 2 valeur",
              name: "counter2_value",
              widget: "number",
            }
          - {
              label: "Compteur 3 label",
              name: "counter3_label",
              widget: "string",
            }
          - {
              label: "Compteur 3 valeur",
              name: "counter3_value",
              widget: "number",
            }
          - {
              label: "Compteur 4 label",
              name: "counter4_label",
              widget: "string",
            }
          - {
              label: "Compteur 4 valeur",
              name: "counter4_value",
              widget: "number",
            }
      - name: "mouvement"
        label: "Le mouvement"
        file: "content/mouvement.json"
        fields:
          - {
              label: "Histoire titre",
              name: "histoire_titre",
              widget: "string",
            }
          - { label: "Histoire texte", name: "histoire_texte", widget: "text" }
          - { label: "But titre", name: "but_titre", widget: "string" }
          - { label: "But texte", name: "but_texte", widget: "text" }
          - { label: "Pilier 1 titre", name: "pilier1_titre", widget: "string" }
          - { label: "Pilier 1 texte", name: "pilier1_texte", widget: "text" }
          - { label: "Pilier 2 titre", name: "pilier2_titre", widget: "string" }
          - { label: "Pilier 2 texte", name: "pilier2_texte", widget: "text" }
          - { label: "Pilier 3 titre", name: "pilier3_titre", widget: "string" }
          - { label: "Pilier 3 texte", name: "pilier3_texte", widget: "text" }
          - { label: "Pilier 4 titre", name: "pilier4_titre", widget: "string" }
          - { label: "Pilier 4 texte", name: "pilier4_texte", widget: "text" }
          - {
              label: "Antennes texte principal",
              name: "antennes_texte",
              widget: "text",
            }
          - {
              label: "Antennes commentaire (HTML autorisé)",
              name: "antennes_commentaire",
              widget: "text",
            }
          - {
              label: "Antennes liste villes",
              name: "antennes_liste_villes",
              widget: "text",
            }
      - name: "soutenir"
