              widget: "string",
            }
          - {
              label: "Bon à savoir paragraphe 1",
              name: "bonasavoir_paragraphe1",
              widget: "text",
            }
          - {
              label: "Bon à savoir paragraphe 2",
              name: "bonasavoir_paragraphe2",
              widget: "text",
            }
          - {
              label: "Bon à savoir paragraphe 3",
              name: "bonasavoir_paragraphe3",
              widget: "text",
            }
          - {
              label: "Bon à savoir paragraphe 4",
              name: "bonasavoir_paragraphe4",
              widget: "text",
            }
          - {
              label: "Bon à savoir paragraphe 5",
              name: "bonasavoir_paragraphe5",
              widget: "text",
            }
      - name: "famille_royale"
        label: "Famille royale"
        file: "content/famille_royale.json"
        fields:
          - { label: "Hero titre", name: "hero_title", widget: "string" }
          - {
              label: "Hero sous-titre",
              name: "hero_subtitle",
              widget: "string",
            }
          - { label: "Bio titre", name: "bio_titre", widget: "string" }
          - {
              label: "Bio paragraphe 1",
