              label: "Boutique titre",
              name: "boutique_titre",
              widget: "string",
            }
          - { label: "Boutique texte", name: "boutique_texte", widget: "text" }
          - {
              label: "Autocollants titre",
              name: "autocollants_titre",
              widget: "string",
            }
          - {
              label: "Autocollants texte",
              name: "autocollants_texte",
              widget: "text",
