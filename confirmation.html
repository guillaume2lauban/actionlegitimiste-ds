<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Confirmation</title>
    <script>
      // Traitement automatique du token
      const params = new URLSearchParams(window.location.search);
      const token = params.get("invite_token") || params.get("confirmation");
      if (token) {
        fetch("/.netlify/identity/confirmation", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
        })
          .then(() => {
            window.location.href = "/admin/";
          })
          .catch((err) => console.error(err));
      }
    </script>
  </head>
  <body>
    <p>Confirmation en cours... redirection vers l'administration.</p>
  </body>
</html>
